server:
  port: 8080

spring:
    application:
      name: gym

    datasource:
      url: ${DB_URL}
      username: ${DB_USERNAME}
      password: ${DB_PASSWORD}
      driver-class-name: org.postgresql.Driver

    jpa:
      hibernate:
        default_schema: gym
        ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          format_sql: true